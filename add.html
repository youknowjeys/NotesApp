<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NotesApp - Add Note</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-notes-cloud h-screen flex flex-col overflow-hidden relative">

    <div class="w-full flex justify-between items-center pt-10 pb-6 px-6 sm:px-12 md:px-20 shrink-0 z-10">
        <h1 class="text-5xl font-cursive text-white drop-shadow-md">NotesApp</h1>
        <div class="flex gap-3">
            <button id="delete-btn" class="px-6 py-2 bg-white/20 hover:bg-red-500/30 text-white rounded-full text-sm border border-white/20 backdrop-blur-sm transition">delete</button>
            <button id="save-btn" class="px-6 py-2 bg-white/80 hover:bg-white text-gray-700 rounded-full text-sm font-medium transition shadow-sm">save</button>
        </div>
    </div>

    <div class="flex-grow w-full px-6 sm:px-12 md:px-20 pb-36 z-10">
        <textarea id="note-text" placeholder="Enter text to start your notes!" 
            class="w-full h-full bg-white/40 backdrop-blur-sm rounded-[30px] p-8 text-gray-800 placeholder-gray-400/80 focus:outline-none text-xl border border-white/20 shadow-inner resize-none font-medium"></textarea>
    </div>

    <div class="fixed bottom-0 left-0 right-0 p-4 z-50">
        <div class="bg-white/90 backdrop-blur-md rounded-[30px] flex justify-around items-center py-4 shadow-xl max-w-lg mx-auto">
            <a href="trash.html" class="text-slate-400 hover:text-red-500 transition"><svg class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg></a>
            <a href="add.html" class="text-blue-600 transition"><svg class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" /></svg></a>
            <a href="dashboard.html" class="text-slate-400 hover:text-slate-800 transition"><svg class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" /></svg></a>
            <a href="profile.html" class="text-slate-400 hover:text-slate-800 transition"><svg class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg></a>
        </div>
    </div>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-auth.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

        // Konfigurasi Firebase NotesApp kamu
        const firebaseConfig = {
            apiKey: "AIzaSyBmP8ZPkeyWiQJMbmuNbFUxb8ZmrgNrKIA",
            authDomain: "notesapp-49f62.firebaseapp.com",
            projectId: "notesapp-49f62",
            storageBucket: "notesapp-49f62.firebasestorage.app",
            messagingSenderId: "55636102699",
            appId: "1:55636102699:web:8615a4d76c93b6ab6d646e"
        };

        // Inisialisasi Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUser = null;

        // Cek status login user
        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user; // Simpan data user yang sedang login
            } else {
                // Kalau belum login, paksa balik ke halaman auth
                window.location.href = "auth.html";
            }
        });

        // Logika ketika tombol SAVE diklik
        document.getElementById('save-btn').addEventListener('click', async () => {
            const textContent = document.getElementById('note-text').value.trim();

            // Validasi: Jangan biarkan user simpan catatan kosong
            if (!textContent) {
                alert('Catatan tidak boleh kosong!');
                return;
            }

            if (!currentUser) {
                alert('Sesi login tidak valid, silakan login ulang.');
                return;
            }

            try {
                // Proses simpan data ke Firestore di dalam collection "notes"
                await addDoc(collection(db, "notes"), {
                    text: textContent,
                    userId: currentUser.uid,        // Menyimpan catatan berdasarkan akun user
                    isDeleted: false,               // Bawaan false (belum dihapus ke trash)
                    createdAt: new Date(),          // Waktu pembuatan catatan
                    color: "bg-white/40"            // Warna dasar transparan estetik kamu
                });

                // KUNCI: Setelah sukses masuk database, langsung pindah ke dashboard!
                window.location.href = "dashboard.html";

            } catch (error) {
                console.error("Error menyimpan data: ", error);
                alert("Gagal menyimpan catatan, coba lagi!");
            }
        });

        // Tambahan Logika: Tombol DELETE/BATAL kalau mau langsung balik ke home
        document.getElementById('delete-btn').addEventListener('click', () => {
            const konfirmasi = confirm("Batalkan menulis catatan?");
            if (konfirmasi) {
                window.location.href = "dashboard.html";
            }
        });
    </script>
</body>
</html>
