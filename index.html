<!-- index.html -->
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NotesApp - Welcome</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Kita butuh CSS custom dikit untuk background gradient yang halus */
        .bg-notes-gradient {
            background: radial-gradient(circle at center, #d0e7f9 0%, #4d7a97 100%);
        }
        /* Dan font tulisan "NotesApp" yang bergaya tulisan tangan */
        @import url('https://fonts.googleapis.com/css2?family=Ms+Madi&display=swap');
        .font-cursive {
            font-family: 'Ms Madi', cursive;
        }
    </style>
</head>
<body class="bg-notes-gradient h-screen flex flex-col items-center justify-center">

    <!-- Area yang bisa diklik. Kursor akan berubah jadi jari -->
    <a href="./auth.html" class="text-center group flex flex-col items-center">
        <!-- Logo Notes (Gunakan file PNG yang sudah kamu export dari Figma) -->
        <img src="./notes-icon.png" alt="NotesApp Logo" class="w-32 h-32 mb-6 group-hover:scale-105 transition-transform duration-300">
        
        <!-- Judul aplikasi bergaya tulisan tangan -->
        <h1 class="text-5xl font-cursive text-white opacity-80 group-hover:opacity-100 transition">NotesApp</h1>
    </a>

</body>
</html>
