<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NotesApp - New Account</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .bg-notes-gradient {
            background: radial-gradient(circle at center, #d0e7f9 0%, #4d7a97 100%);
        }
        @import url('https://fonts.googleapis.com/css2?family=Ms+Madi&display=swap');
        .font-cursive {
            font-family: 'Ms Madi', cursive;
        }
    </style>
</head>
<body class="bg-notes-gradient h-screen flex flex-col items-center justify-center relative px-6">

    <!-- Tombol Back (Kiri Atas) -->
    <a href="auth.html" class="absolute top-6 left-6 bg-white/80 p-2 rounded-full shadow-md hover:bg-white transition">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-gray-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
        </svg>
    </a>

    <!-- Logo -->
    <h1 class="text-6xl font-cursive text-white mb-16">NotesApp</h1>

    <!-- Form Container -->
    <div class="w-full max-w-sm space-y-4">
        
        <!-- Input Username -->
        <div class="relative">
            <span class="absolute inset-y-0 left-4 flex items-center text-gray-400">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                </svg>
            </span>
            <input type="text" placeholder="USERNAME" 
                class="w-full py-4 pl-12 pr-4 bg-white/90 rounded-2xl shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-300 placeholder:text-gray-400 text-gray-600 tracking-widest text-sm font-medium">
        </div>

        <!-- Input Password -->
        <div class="relative">
            <span class="absolute inset-y-0 left-4 flex items-center text-gray-400">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                </svg>
            </span>
            <input type="password" placeholder="PASSWORD" 
                class="w-full py-4 pl-12 pr-4 bg-white/90 rounded-2xl shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-300 placeholder:text-gray-400 text-gray-600 tracking-widest text-sm font-medium">
        </div>

    </div>

    <!-- Tombol Submit (Login/Register) -->
    <button class="mt-24 bg-white/90 text-[#4d7a97] px-16 py-3 rounded-2xl text-2xl font-cursive shadow-lg hover:bg-white transition duration-300">
        Login
    </button>

</body>
</html>
