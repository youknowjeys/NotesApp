<!-- auth.html -->
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NotesApp - Login or Sign Up</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .bg-notes-gradient {
            background: radial-gradient(circle at center, #d0e7f9 0%, #4d7a97 100%);
        }
        @import url('https://fonts.googleapis.com/css2?family=Ms+Madi&display=swap');
        .font-cursive {
            font-family: 'Ms Madi', cursive;
        }
    </style>
</head>
<body class="bg-notes-gradient h-screen flex flex-col">

    <!-- Area Atas (Gradient & Teks kecil) -->
    <div class="flex-grow flex flex-col items-center justify-center text-center px-4 pt-10 pb-16">
        <h1 class="text-4xl font-cursive text-white mb-3">NotesApp</h1>
        <p class="text-white opacity-80 text-sm max-w-xs">want to keep your secret? register here!</p>
    </div>

    <!-- Area Bawah (Panel Putih Melengkung) -->
    <div class="bg-white rounded-t-[40px] px-8 pt-12 pb-10 shadow-2xl mt-auto">
        
        <!-- Tombol Utama -->
        <div class="flex gap-4 justify-center mb-8">
            <a href="register.html" class="bg-[#A0B0C0] text-white px-8 py-3 rounded-full text-sm font-medium hover:bg-[#8da0b3]">
    New account
</a>
            <a href="./dashboard.html" class="bg-[#A0B0C0] text-white px-10 py-3 rounded-full text-sm font-medium hover:bg-[#8da0b3]">Login</a>
        </div>

        <!-- Teks Deskripsi -->
        <p class="text-xs text-center text-gray-700 leading-relaxed max-w-sm mx-auto mb-10">
            This login is useful for saving notes that you have recorded in this apk, we hope you don't miss this.
        </p>

        <!-- Garis Pemisah "Sign in with" -->
        <div class="mt-6">
    <div class="relative mb-6">
        <div class="absolute inset-0 flex items-center">
            <span class="w-full border-t border-gray-300"></span>
        </div>
        <div class="relative flex justify-center text-sm">
            <span class="px-2 bg-white text-gray-500">Or continue with</span>
        </div>
    </div>

    <div class="grid grid-cols-2 gap-4">
        <!-- Tombol Google -->
        <button onclick="loginWithGoogle()" class="flex items-center justify-center py-2 px-4 border border-gray-300 rounded-lg shadow-sm bg-white hover:bg-gray-50 transition duration-200">
            <img src="./google.png" alt="Google" class="w-6 h-6 mr-2">
            <span class="text-sm font-medium text-gray-700">Google</span>
        </button>

        <!-- Tombol GitHub -->
        <button onclick="loginWithGithub()" class="flex items-center justify-center py-2 px-4 border border-gray-300 rounded-lg shadow-sm bg-white hover:bg-gray-50 transition duration-200">
            <img src="./github.png" alt="GitHub" class="w-6 h-6 mr-2">
            <span class="text-sm font-medium text-gray-700">GitHub</span>
        </button>
    </div>
    </div>
    <script type="module">
    // 1. Import Firebase SDK (Hanya satu kali saja)
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
    import { 
        getAuth, 
        signInWithPopup, 
        GoogleAuthProvider, 
        GithubAuthProvider 
    } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-auth.js";

    // 2. Konfigurasi Firebase
    const firebaseConfig = {
        apiKey: "AIzaSyBmP8ZPkeyWiQJMbmuNbFUxb8ZmrgNrKIA",
        authDomain: "notesapp-49f62.firebaseapp.com",
        projectId: "notesapp-49f62",
        storageBucket: "notesapp-49f62.firebasestorage.app",
        messagingSenderId: "55636102699",
        appId: "1:55636102699:web:8615a4d76c93b6ab6d646e"
    };

    // 3. Inisialisasi Firebase
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const googleProvider = new GoogleAuthProvider();
    const githubProvider = new GithubAuthProvider();

// 4. Daftarkan fungsi ke objek window agar bisa dipanggil oleh onclick di HTML
    window.loginWithGoogle = function() {
        console.log("Mencoba Login Google...");
        signInWithPopup(auth, googleProvider)
            .then((result) => {
                console.log("Login Google Berhasil");
                window.location.href = "dashboard.html"; 
            })
            .catch((error) => {
                console.error(error);
                // Handle account exists with different credential
                if (error.code === 'auth/account-exists-with-different-credential') {
                    alert("Akun ini sudah terdaftar dengan metode login lain. Silakan gunakan cara login yang sama seperti saat pertama mendaftar (misal: Google).");
                } else {
                    alert("Google Error: " + error.message);
                }
            });
    };

    window.loginWithGithub = function() {
        console.log("Mencoba Login GitHub...");
        signInWithPopup(auth, githubProvider)
            .then((result) => {
                console.log("Login GitHub Berhasil");
                window.location.href = "dashboard.html";
            })
            .catch((error) => {
                console.error(error);
                // Handle account exists with different credential
                if (error.code === 'auth/account-exists-with-different-credential') {
                    alert("Akun ini sudah terdaftar dengan metode login lain. Silakan gunakan cara login yang sama seperti saat pertama mendaftar (misal: Google).");
                } else {
                    alert("GitHub Error: " + error.message);
                }
            });
    };
    </script>
</body>
</html>
