<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NotesApp - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-notes-cloud h-screen flex flex-col overflow-hidden">

    <div class="pt-10 pb-6 text-center shrink-0">
        <h1 class="text-5xl font-cursive text-white drop-shadow-md">NotesApp</h1>
    </div>

    <div id="notes-container" class="w-full flex-grow overflow-y-auto px-6 sm:px-12 md:px-20 space-y-4 pb-36 no-scrollbar">
        </div>

    <div id="editModal" class="fixed inset-0 bg-black/60 hidden flex items-center justify-center p-4 z-50 backdrop-blur-sm">
        <div class="bg-gradient-to-b from-cyan-100 to-blue-400 w-full max-w-lg rounded-[30px] p-6 shadow-2xl border border-white/30">
            <div class="flex justify-between items-center mb-6 px-2">
                <h2 class="text-blue-900 font-bold text-xl">Edit Note</h2>
                <button onclick="closeModal()" class="text-blue-900 hover:text-red-500 p-1 bg-white/20 rounded-full transition">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>
            
            <form onsubmit="updateNote(); return false;">
                <input type="hidden" id="editNoteId">
                <div class="mb-6">
                    <textarea id="editContent" rows="8" 
                        class="w-full bg-white/90 border-none rounded-2xl px-5 py-4 text-gray-800 placeholder-gray-400 focus:ring-4 focus:ring-blue-300 text-lg shadow-inner resize-none font-medium"
                        placeholder="Tulis perubahanmu..."></textarea>
                </div>

                <div class="flex justify-between items-center px-2 w-full">
                    <button type="button" onclick="deleteNote()" class="px-5 py-2.5 rounded-full bg-red-100 text-red-600 hover:bg-red-200 transition font-semibold flex items-center gap-1 text-sm">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                        Hapus
                    </button>
                    
                    <div class="flex gap-2">
                        <button type="button" onclick="closeModal()" class="px-5 py-2.5 rounded-full bg-white/50 text-blue-900 hover:bg-white/80 transition font-semibold text-sm">Batal</button>
                        <button type="submit" class="px-8 py-2.5 rounded-full bg-blue-600 text-white font-bold hover:bg-blue-700 shadow-lg transition-transform active:scale-95 text-sm">Simpan</button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <div class="fixed bottom-0 left-0 right-0 p-4 z-50">
        <div class="bg-white/90 backdrop-blur-md rounded-[30px] flex justify-around items-center py-4 shadow-xl max-w-lg mx-auto">
            <a href="trash.html" class="text-slate-400 hover:text-red-500 transition"><svg class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg></a>
            <a href="add.html" class="text-slate-400 hover:text-slate-800 transition"><svg class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" /></svg></a>
            <a href="dashboard.html" class="text-blue-600 transition"><svg class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" /></svg></a>
            <a href="profile.html" class="text-slate-400 hover:text-slate-800 transition"><svg class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg></a>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-auth.js";
        import { getFirestore, collection, query, where, onSnapshot, orderBy, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBmP8ZPkeyWiQJMbmuNbFUxb8ZmrgNrKIA",
            authDomain: "notesapp-49f62.firebaseapp.com",
            projectId: "notesapp-49f62",
            storageBucket: "notesapp-49f62.firebasestorage.app",
            messagingSenderId: "55636102699",
            appId: "1:55636102699:web:8615a4d76c93b6ab6d646e"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        
        const container = document.getElementById('notes-container');

        onAuthStateChanged(auth, (user) => {
            if (!user) {
                window.location.href = "auth.html";
                return;
            }

            const q = query(
                collection(db, "notes"), 
                where("userId", "==", user.uid),
                where("isDeleted", "==", false),
                orderBy("createdAt", "desc")
            );

            onSnapshot(q, (snapshot) => {
                container.innerHTML = "";
                
                if (snapshot.empty) {
                    container.innerHTML = `<p class="text-center text-white/70 font-medium mt-10">No notes yet...</p>`;
                    return; 
                }

                snapshot.forEach((docSnap) => {
                    const note = docSnap.data();
                    const noteId = docSnap.id;
                    const noteText = note.text || '';
                    
                    const div = document.createElement('div');
                    div.className = `${note.color || 'bg-white/40'} backdrop-blur-sm rounded-[25px] p-8 h-32 shadow-sm border border-white/20 transition-all duration-200 hover:scale-[1.01] cursor-pointer flex items-start overflow-hidden w-full`;
                    div.innerHTML = `<p class="text-gray-800 font-medium text-lg leading-tight line-clamp-2">${noteText}</p>`;
                    
                    // PERBAIKAN: Diubah dari 'text' menjadi 'noteText' agar tidak menyebabkan bug macet
                    div.onclick = () => window.openEditModal(noteId, noteText);
                    
                    container.appendChild(div);
                });
            });
        });

        window.openEditModal = function(noteId, text) {
            document.getElementById('editNoteId').value = noteId;
            document.getElementById('editContent').value = text;
            document.getElementById('editModal').classList.remove('hidden');
        };

        window.closeModal = function() {
            document.getElementById('editModal').classList.add('hidden');
        };

        window.updateNote = async function() {
            const noteId = document.getElementById('editNoteId').value;
            const newText = document.getElementById('editContent').value.trim();
            
            if (!newText) return alert('Catatan tidak boleh kosong!');

            try {
                const noteRef = doc(db, "notes", noteId);
                await updateDoc(noteRef, { text: newText });
                closeModal();
            } catch (error) {
                console.error(error);
                alert('Gagal memperbarui catatan!');
            }
        };

        window.deleteNote = async function() {
            const noteId = document.getElementById('editNoteId').value;
            
            if (!noteId) return;

            const konfirmasi = confirm("Pindahkan catatan ini ke tempat sampah?");
            if (konfirmasi) {
                try {
                    const noteRef = doc(db, "notes", noteId);
                    
                    // Mengubah status isDeleted menjadi true agar masuk ke trash
                    await updateDoc(noteRef, { 
                        isDeleted: true,
                        deletedAt: new Date() 
                    });
                    
                    closeModal();
                } catch (error) {
                    console.error("Gagal menghapus:", error);
                    alert("Gagal menghapus catatan!");
                }
            }
        };
    </script>
</body>
</html>
