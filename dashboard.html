<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NotesApp - Library</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .bg-notes-gradient {
            background: radial-gradient(circle at center, #d0e7f9 0%, #4d7a97 100%);
        }
        @import url('https://fonts.googleapis.com/css2?family=Ms+Madi&display=swap');

            font-family: 'Ms Madi', cursive;
        }
        /* Menghilangkan scrollbar tapi tetap bisa di-scroll */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body class="bg-notes-gradient h-screen flex flex-col overflow-hidden">

    <div class="pt-10 pb-6 text-center shrink-0">
        <h1 class="text-5xl font-cursive text-white drop-shadow-md">NotesApp</h1>
    </div>

    <div id="notes-container" class="flex-grow overflow-y-auto px-6 space-y-4 pb-32 no-scrollbar">
        <div class="bg-white/40 backdrop-blur-sm rounded-[25px] p-8 h-32 shadow-sm border border-white/20 transition active:scale-95 cursor-pointer">

        </div>

        <div class="bg-[#93C5FD]/60 backdrop-blur-sm rounded-[25px] p-8 h-32 shadow-sm border border-white/20 transition active:scale-95 cursor-pointer">

        </div>

        <div class="bg-[#60A5FA]/60 backdrop-blur-sm rounded-[25px] p-8 h-32 shadow-sm border border-white/20 transition active:scale-95 cursor-pointer">

        </div>

        <div class="bg-[#3B82F6]/60 backdrop-blur-sm rounded-[25px] p-8 h-32 shadow-sm border border-white/20 transition active:scale-95 cursor-pointer">
            <p class="text-white/60 italic text-sm">Project ideas...</p>
        </div>

        <div class="bg-white/40 backdrop-blur-sm rounded-[25px] p-8 h-32 shadow-sm border border-white/20 transition active:scale-95 cursor-pointer"></div>
    </div>

<div class="fixed bottom-0 left-0 right-0 p-4">
        <div class="bg-white/90 backdrop-blur-md rounded-[30px] flex justify-around items-center py-4 shadow-xl max-w-lg mx-auto">
            <a href="trash.html" class="text-slate-500 hover:text-red-400 transition">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                </svg>
            </a>
            <a href="add.html" class="text-slate-800 transition">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
                </svg>
            </a>
            <a href="dashboard.html" class="text-slate-500 hover:text-slate-800 transition">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
                </svg>
            </a>
            <a href="profile.html" class="text-slate-500 hover:text-slate-800 transition">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                </svg>
            </a>
        </div>
    </div>
<script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-auth.js";
import { getFirestore, collection, query, where, onSnapshot, orderBy, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBmP8ZPkeyWiQJMbmuNbFUxb8ZmrgNrKIA",
            authDomain: "notesapp-49f62.firebaseapp.com",
            projectId: "notesapp-49f62",
            storageBucket: "notesapp-49f62.firebasestorage.app",
            messagingSenderId: "55636102699",
            appId: "1:55636102699:web:8615a4d76c93b6ab6d646e"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const container = document.getElementById('notes-container');

// Render notes from Firestore based on current user
        onAuthStateChanged(auth, (user) => {
            if (!user) {
                window.location.href = "auth.html";
                return;
            }

            console.log("User logged in:", user.uid);

// Query notes for current user (not deleted) and sort by newest first
            const q = query(
                collection(db, "notes"), 
                where("userId", "==", user.uid),
                where("isDeleted", "==", false),
                orderBy("createdAt", "desc")
            );

            onSnapshot(q, (snapshot) => {
                console.log("Notes found:", snapshot.size);
                container.innerHTML = "";
                
                if (snapshot.empty) {
                    container.innerHTML = `<p class="text-white/60 italic text-center pt-20">No notes yet...</p>`;
                    return;
                }

snapshot.forEach((doc) => {
                    const note = doc.data();
                    const noteId = doc.id;
                    console.log("Note:", note.text);
                    container.innerHTML += `
                        <div onclick="moveToTrash('${noteId}')" class="${note.color || 'bg-white/40'} backdrop-blur-sm rounded-[25px] p-8 h-32 shadow-sm border border-white/20 transition active:scale-95 cursor-pointer flex items-start overflow-hidden">
                            <p class="text-gray-700/80 font-medium text-lg leading-tight line-clamp-2">${note.text}</p>
                        </div>
                    `;
                });

// Fungsi pindahkan ke Trash
                window.moveToTrash = async function(noteId) {
                    if (!confirm("Hapus catatan ini?")) return;
                    const noteRef = doc(db, "notes", noteId);
                    await updateDoc(noteRef, {
                        isDeleted: true
                    });
                    console.log("Note moved to trash:", noteId);
                    window.location.href = "trash.html";
                };
            });
        });
    </script>
