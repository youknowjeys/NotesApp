<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NotesApp - Profile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-notes-cloud h-screen flex flex-col items-center overflow-hidden relative">

    <div class="pt-10 pb-6 text-center shrink-0 z-10">
        <h1 class="text-5xl font-cursive text-white drop-shadow-md">NotesApp</h1>
    </div>

    <div class="w-full max-w-2xl flex-grow overflow-y-auto px-6 space-y-4 pb-36 no-scrollbar z-10 flex flex-col items-center">
        
        <div class="bg-white/40 backdrop-blur-sm rounded-[25px] p-6 border border-white/20 shadow-sm flex items-center gap-5 w-full">
            <img id="profile-pic" src="https://via.placeholder.com/60" alt="Profile" class="w-16 h-16 rounded-full border-2 border-white/60 object-cover shadow-sm">
            <div>
                <h2 id="profile-name" class="text-gray-800 font-bold text-2xl font-cursive leading-tight">Loading...</h2>
                <p class="text-gray-500 text-xs tracking-wider uppercase font-medium">Authorized by Google</p>
            </div>
        </div>

        <div class="bg-white/40 backdrop-blur-sm rounded-[25px] p-5 border border-white/20 shadow-sm text-center w-full">
            <p id="profile-email" class="text-gray-700 font-medium text-lg">loading...</p>
        </div>

        <div class="bg-white/40 backdrop-blur-sm rounded-[25px] p-5 border border-white/20 shadow-sm text-center w-full">
            <p class="text-gray-500 font-medium text-base italic font-cursive">Banyumas, Central Java</p>
        </div>

        <button id="logout-btn" class="w-full bg-red-400/90 hover:bg-red-500 text-white font-bold py-4 rounded-[25px] shadow-md transition transform active:scale-95 tracking-widest text-sm shrink-0">
            LOGOUT
        </button>

    </div>

    <div class="fixed bottom-0 left-0 right-0 p-4 z-50">
        <div class="bg-white/90 backdrop-blur-md rounded-[30px] flex justify-around items-center py-4 shadow-xl max-w-lg mx-auto">
            <a href="trash.html" class="text-slate-400 hover:text-red-500 transition"><svg class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg></a>
            <a href="add.html" class="text-slate-400 hover:text-slate-800 transition"><svg class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" /></svg></a>
            <a href="dashboard.html" class="text-slate-400 hover:text-slate-800 transition"><svg class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" /></svg></a>
            <a href="profile.html" class="text-blue-600 transition"><svg class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg></a>
        </div>
    </div>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBmP8ZPkeyWiQJMbmuNbFUxb8ZmrgNrKIA",
            authDomain: "notesapp-49f62.firebaseapp.com",
            projectId: "notesapp-49f62",
            storageBucket: "notesapp-49f62.firebasestorage.app",
            messagingSenderId: "55636102699",
            appId: "1:55636102699:web:8615a4d76c93b6ab6d646e"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // Menangkap perubahan status login pengguna
        onAuthStateChanged(auth, (user) => {
            if (user) {
                // 1. Ambil data profil dari akun Google / Firebase
                const name = user.displayName || "User NotesApp";
                const email = user.email || "Email tidak ditemukan";
                const photo = user.photoURL || "https://via.placeholder.com/60";

                // 2. Tembakkan langsung ke elemen HTML agar tulisan "Loading..." hilang
                document.getElementById('profile-name').innerText = name;
                document.getElementById('profile-email').innerText = email;
                document.getElementById('profile-pic').src = photo;
            } else {
                // Kalau tidak ada user (belum login/sudah logout), tendang ke auth.html
                window.location.href = "auth.html";
            }
        });

        // Logika untuk Tombol Logout
        document.getElementById('logout-btn').addEventListener('click', async () => {
            const konfirmasi = confirm("Apakah kamu yakin ingin keluar?");
            if (konfirmasi) {
                try {
                    await signOut(auth);
                    window.location.href = "auth.html";
                } catch (error) {
                    console.error("Gagal logout:", error);
                    alert("Gagal melakukan logout, coba lagi!");
                }
            }
        });
    </script>
</body>
</html>
