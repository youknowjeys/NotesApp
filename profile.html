<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - NotesApp</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Ms+Madi&display=swap" rel="stylesheet">
    <style>
        .bg-notes-gradient { background: radial-gradient(circle at center, #d0e7f9 0%, #4d7a97 100%); }
        .font-cursive { font-family: 'Ms Madi', cursive; }
    </style>
</head>
<body class="bg-notes-gradient h-screen flex flex-col px-6 pt-10 space-y-6 overflow-hidden">
    
    <h1 class="text-4xl font-cursive text-white text-center drop-shadow-md">NotesApp</h1>
    
    <div class="bg-white/90 backdrop-blur-md rounded-[40px] p-8 flex items-center space-x-4 shadow-lg">
        <img id="user-photo" src="https://via.placeholder.com/150" alt="Avatar" class="w-20 h-20 rounded-full border-2 border-white shadow-sm object-cover">
        
        <div>
            <h2 id="user-name" class="font-cursive text-3xl text-slate-700 leading-tight">Loading...</h2>
            <p id="user-provider" class="text-slate-400 text-xs uppercase tracking-widest">Authorized User</p>
        </div>
    </div>

    <div class="space-y-3">
        <div class="bg-white/80 py-4 px-8 rounded-full text-center font-medium text-slate-600 shadow-sm overflow-hidden truncate">
            <span id="user-email">Email not found</span>
        </div>
        <div class="bg-white/80 py-4 px-8 rounded-full text-center font-cursive text-slate-500 shadow-sm">
            Banyuwangi, East Java
        </div>
        <button onclick="logout()" class="w-full bg-red-400/80 text-white py-4 rounded-full font-bold shadow-md hover:bg-red-500 transition mt-4">
            LOGOUT
        </button>
    </div>

    <div class="fixed bottom-0 left-0 right-0 p-4">
        <div class="bg-white/90 backdrop-blur-md rounded-[30px] flex justify-around items-center py-4 shadow-xl max-w-lg mx-auto">
            <a href="trash.html" class="text-slate-400"><svg class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg></a>
            <a href="add.html" class="text-slate-400"><svg class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" /></svg></a>
            <a href="dashboard.html" class="text-slate-400"><svg class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" /></svg></a>
            <a href="profile.html" class="text-slate-800"><svg class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg></a>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBmP8ZPkeyWiQJMbmuNbFUxb8ZmrgNrKIA",
            authDomain: "notesapp-49f62.firebaseapp.com",
            projectId: "notesapp-49f62",
            storageBucket: "notesapp-49f62.firebasestorage.app",
            messagingSenderId: "55636102699",
            appId: "1:55636102699:web:8615a4d76c93b6ab6d646e"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // Cek siapa yang login
        onAuthStateChanged(auth, (user) => {
            if (user) {
                // Ambil data user dari Google/GitHub
                document.getElementById('user-name').innerText = user.displayName || "Anonymous User";
                document.getElementById('user-email').innerText = user.email;
                document.getElementById('user-photo').src = user.photoURL || "https://via.placeholder.com/150";
                
                // Tampilkan info login lewat apa (Google/GitHub)
                const provider = user.providerData[0].providerId;
                document.getElementById('user-provider').innerText = "Authorized by " + provider.split('.')[0];
            } else {
                // Jika tidak login, tendang balik ke auth.html
                window.location.href = "auth.html";
            }
        });

        // Fungsi Logout
        window.logout = function() {
            signOut(auth).then(() => {
                window.location.href = "auth.html";
            });
        }
    </script>
    <!-- NAVBAR BAWAH -->
<div class="fixed bottom-0 left-0 right-0 p-4">
    <div class="bg-white/90 backdrop-blur-md rounded-[30px] flex justify-around items-center py-4 shadow-xl max-w-lg mx-auto">
        
        <!-- Ke Halaman Trash -->
        <a href="trash.html" class="text-slate-400 hover:text-slate-800 transition">
            <svg class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
            </svg>
        </a>

        <!-- Ke Halaman Tambah Note -->
        <a href="add.html" class="text-slate-400 hover:text-slate-800 transition">
            <svg class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
            </svg>
        </a>

        <!-- Ke Halaman Utama (Dashboard) -->
        <a href="dashboard.html" class="text-slate-400 hover:text-slate-800 transition">
            <svg class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
            </svg>
        </a>

        <!-- Ke Halaman Profile -->
        <a href="profile.html" class="text-slate-400 hover:text-slate-800 transition">
            <svg class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
            </svg>
        </a>

    </div>
</div>
</body>
</html>
